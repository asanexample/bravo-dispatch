# Per-service ServiceAccounts for services that use self-service AWS resources. EKS Pod Identity binds ONE
# role per (namespace, serviceAccount), so a service that declares `resources` needs its OWN SA — the
# Composition mints a Pod-bravo-dispatch-<stage>-shipments role with the derived least-privilege DynamoDB IAM
# and associates it here. No eks.amazonaws.com/role-arn annotation (that's IRSA — denied by policy).
# (tracker has no resources of its own, so it shares app-bravo in serviceaccount.yaml.)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-bravo-shipments
  labels:
    app.kubernetes.io/name: app-bravo-shipments
