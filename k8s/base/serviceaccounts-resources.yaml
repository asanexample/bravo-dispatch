# Per-service ServiceAccounts for services that use self-service AWS resources. EKS Pod Identity binds ONE
# role per (namespace, serviceAccount), so a service that declares `resources` needs its OWN SA — the
# Composition mints a Pod-bravo-dispatch-<stage>-<service> role with the derived least-privilege IAM and
# associates it here. No eks.amazonaws.com/role-arn annotation (that's IRSA — denied by policy).
# (tracker/intake/notify have no resources of their own, so they share app-bravo in serviceaccount.yaml.)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-bravo-shipments
  labels:
    app.kubernetes.io/name: app-bravo-shipments
---
# dispatch-worker owns its own SQS queue (requests, readwrite) AND its own SNS topic (events, readwrite) — both
# self-service resources scoped to this one service (ADR-073), hence its own SA/role.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-bravo-dispatch-worker
  labels:
    app.kubernetes.io/name: app-bravo-dispatch-worker
