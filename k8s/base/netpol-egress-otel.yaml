# Egress to the platform OTLP collector (observability/otel-collector:4318) so the OTel SDK can export traces
# — the half that makes log→trace work (P14 / ADR-077). podSelector {} → applies to every Bravo Dispatch pod
# (tracker + shipments). Environment namespaces default-deny egress; NetworkPolicies are additive.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-otel-collector
spec:
  podSelector: {}
  policyTypes: ["Egress"]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - port: 4318
          protocol: TCP
