# shipments — internal shipments service (ClusterIP, no HTTPRoute). Looks up/lists parcel records for the
# tracker BFF, backed by the self-service DynamoDB table (SHIPMENTS_TABLE) from the shipments-resources
# ConfigMap (ADR-073). AWS creds via Pod Identity on the app-bravo-shipments SA; AWS_REGION explicit (IMDS
# blocked).
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: shipments
  labels:
    app: shipments
    app.kubernetes.io/name: dispatch-shipments
    team: bravo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shipments
  strategy:
    canary:
      maxSurge: 1
      maxUnavailable: 0
      steps:
        - setWeight: 100
  template:
    metadata:
      annotations:
        instrumentation.opentelemetry.io/inject-sdk: "platform"
      labels:
        app: shipments
        app.kubernetes.io/name: dispatch-shipments
        team: bravo
    spec:
      serviceAccountName: app-bravo-shipments
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          matchLabelKeys: [rollouts-pod-template-hash]
          labelSelector:
            matchLabels:
              app: shipments
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          matchLabelKeys: [rollouts-pod-template-hash]
          labelSelector:
            matchLabels:
              app: shipments
      containers:
        - name: shipments
          image: 829808296602.dkr.ecr.us-east-1.amazonaws.com/team-bravo/dispatch-shipments:placeholder
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: shipments-resources
                optional: true
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: AWS_REGION
              value: us-east-1
            - name: OTEL_SERVICE_NAME
              value: dispatch-shipments
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.namespace=bravo-dispatch
            - name: PYROSCOPE_SERVER_ADDRESS
              value: https://preprod-profiles.aws.refplat.org
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 10
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
