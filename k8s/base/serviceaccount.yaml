# Named ServiceAccount the app's pods run as. If the Environment needs AWS, access is granted out-of-band by a
# platform-managed EKS Pod Identity association (declare it in the Environment claim's
# services.<svc>.permissions.aws) -> the per-service Pod-<team>-<product>-<stage>-<service> role (ADR-041/067).
# Deliberately NO eks.amazonaws.com/role-arn annotation (that's IRSA, denied in environment namespaces by the
# disallow-irsa-annotation-cross-team policy).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-bravo
  labels:
    app.kubernetes.io/name: app-bravo
