# East-west egress from the tracker BFF to the internal shipments service. Same namespace, port 8080. The
# environment default-denies egress and in-cluster pod-to-pod is Cilium identity-matched (the broad 0.0.0.0/0
# egress used for AWS does NOT cover pods), so this specific allow is required. DNS to CoreDNS resolves the
# Service name. shipments enforces the ingress half (shipments/cnp-ingress-from-tracker.yaml).
#
# P1 has no cross-namespace hop (no flagship flag consumption yet — that lands with dispatch-worker in P2, and
# needs its own egress/ingress CNP pair then, per the known Cilium 0.0.0.0/0-doesn't-cover-pod-hops trap).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-tracker-egress-eastwest
spec:
  endpointSelector:
    matchLabels:
      app: tracker
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toEndpoints:
        - matchLabels:
            app: shipments
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
