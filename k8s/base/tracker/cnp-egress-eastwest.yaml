# East-west egress from the tracker BFF: to the internal shipments service (lookups), and to intake
# (forward-compatible — nothing calls it through tracker yet; see intake/cnp-ingress-from-tracker.yaml). Same
# namespace, port 8080 for both. The environment default-denies egress and in-cluster pod-to-pod is Cilium
# identity-matched (the broad 0.0.0.0/0 egress used for AWS does NOT cover pods), so these specific allows are
# required. DNS to CoreDNS resolves the Service names. shipments/intake enforce their own ingress halves.
#
# No cross-namespace hop from tracker (no flagship flag consumption here) — that's dispatch-worker's, with its
# own egress/ingress CNP pair (dispatch-worker/cnp-egress-flagship.yaml), per the known Cilium
# 0.0.0.0/0-doesn't-cover-pod-hops trap.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-tracker-egress-eastwest
spec:
  endpointSelector:
    matchLabels:
      app: tracker
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toEndpoints:
        - matchLabels:
            app: shipments
        - matchLabels:
            app: intake
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
