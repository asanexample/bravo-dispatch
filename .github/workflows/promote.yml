name: Promote

# On-demand promotion UP the stage ladder (#377 / ADR-067 §8). Moves the SAME signed digest already deployed in a
# lower stage up into the target stage, by opening a gated Release PR via the app-team-unwritable shared
# asanexample/trusted-ci promote.yml (the supply-chain backbone). THIS repo's main is NEVER written (no
# contents:write) — exactly like deploy.yml's dev auto-promote, just triggered by hand for higher stages.
#
# The target Environment must already exist (gitops/environments/bravo/dispatch/<to_stage>.yaml) —
# the gitops Gate rejects a Release for a stage with no Environment claim. `prod` is GATED (#377 Phase 3): a prod
# promotion opens the Release PR like any other, but the gitops Gate does NOT auto-merge it — it requires a
# release-approver's review (a current-SHA admin/maintainer approval ≠ author) before it can merge.

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service within the product to promote (image team-bravo/dispatch-<service>)."
        required: true
        default: tracker
        type: string
      from_stage:
        description: "Source stage to copy the deployed digest FROM (the same signed artifact moves up)."
        required: true
        default: dev
        type: choice
        options: [dev, test, uat, staging]
      to_stage:
        description: "Target stage to promote INTO (must already have an Environment). prod is GATED — needs a release-approver review."
        required: true
        default: test
        type: choice
        options: [test, uat, staging, prod]
      customer:
        description: "Optional customer (per-customer environments). Empty for pooled."
        required: false
        default: ""
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  promote:
    permissions:
      id-token: write # OIDC -> per-Product role -> read the promote App key (NO contents write on this repo)
      contents: read
    uses: asanexample/trusted-ci/.github/workflows/promote.yml@28dbe1b66c2be6b05801575617d307cafd4a67e7
    with:
      product: dispatch
      service: ${{ inputs.service }}
      stage: ${{ inputs.to_stage }}
      from_stage: ${{ inputs.from_stage }}
      customer: ${{ inputs.customer }}
