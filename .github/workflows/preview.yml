name: PR Preview

# Thin caller (same shared build-sign + slsa-provenance siblings as deploy.yml, but no deploy/promote job).
# Builds + signs + provenances a PR image PER SERVICE so previews satisfy the same Kyverno verify-images /
# verify-attestations checks. Fork PRs get no OIDC token, so they fail closed (cannot push) — by design.

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  id-token: write
  contents: read

jobs:
  build-tracker:
    permissions: { id-token: write, contents: read }
    uses: asanexample/trusted-ci/.github/workflows/build-sign.yml@7a739dcd25cff26ac7c33f2301166a1c34301b6c
    with:
      app: dispatch-tracker
      product: dispatch
      tag: ${{ github.event.pull_request.head.sha }}
      dockerfile: services/tracker/Dockerfile

  provenance-tracker:
    needs: build-tracker
    if: github.actor != 'dependabot[bot]' && github.event.pull_request.head.repo.fork != true
    permissions: { id-token: write, contents: read }
    uses: asanexample/trusted-ci/.github/workflows/slsa-provenance.yml@28dbe1b66c2be6b05801575617d307cafd4a67e7
    with:
      image: ${{ needs.build-tracker.outputs.image }}
      digest: ${{ needs.build-tracker.outputs.digest }}
      product: dispatch

  build-shipments:
    permissions: { id-token: write, contents: read }
    uses: asanexample/trusted-ci/.github/workflows/build-sign.yml@7a739dcd25cff26ac7c33f2301166a1c34301b6c
    with:
      app: dispatch-shipments
      product: dispatch
      tag: ${{ github.event.pull_request.head.sha }}
      dockerfile: services/shipments/Dockerfile

  provenance-shipments:
    needs: build-shipments
    if: github.actor != 'dependabot[bot]' && github.event.pull_request.head.repo.fork != true
    permissions: { id-token: write, contents: read }
    uses: asanexample/trusted-ci/.github/workflows/slsa-provenance.yml@28dbe1b66c2be6b05801575617d307cafd4a67e7
    with:
      image: ${{ needs.build-shipments.outputs.image }}
      digest: ${{ needs.build-shipments.outputs.digest }}
      product: dispatch

  build-intake:
    permissions: { id-token: write, contents: read }
    uses: asanexample/trusted-ci/.github/workflows/build-sign.yml@7a739dcd25cff26ac7c33f2301166a1c34301b6c
    with:
      app: dispatch-intake
      product: dispatch
      tag: ${{ github.event.pull_request.head.sha }}
      dockerfile: services/intake/Dockerfile

  provenance-intake:
    needs: build-intake
    if: github.actor != 'dependabot[bot]' && github.event.pull_request.head.repo.fork != true
    permissions: { id-token: write, contents: read }
    uses: asanexample/trusted-ci/.github/workflows/slsa-provenance.yml@28dbe1b66c2be6b05801575617d307cafd4a67e7
    with:
      image: ${{ needs.build-intake.outputs.image }}
      digest: ${{ needs.build-intake.outputs.digest }}
      product: dispatch

  build-dispatch-worker:
    permissions: { id-token: write, contents: read }
    uses: asanexample/trusted-ci/.github/workflows/build-sign.yml@7a739dcd25cff26ac7c33f2301166a1c34301b6c
    with:
      app: dispatch-dispatch-worker
      product: dispatch
      tag: ${{ github.event.pull_request.head.sha }}
      dockerfile: services/dispatch-worker/Dockerfile

  provenance-dispatch-worker:
    needs: build-dispatch-worker
    if: github.actor != 'dependabot[bot]' && github.event.pull_request.head.repo.fork != true
    permissions: { id-token: write, contents: read }
    uses: asanexample/trusted-ci/.github/workflows/slsa-provenance.yml@28dbe1b66c2be6b05801575617d307cafd4a67e7
    with:
      image: ${{ needs.build-dispatch-worker.outputs.image }}
      digest: ${{ needs.build-dispatch-worker.outputs.digest }}
      product: dispatch

  build-notify:
    permissions: { id-token: write, contents: read }
    uses: asanexample/trusted-ci/.github/workflows/build-sign.yml@7a739dcd25cff26ac7c33f2301166a1c34301b6c
    with:
      app: dispatch-notify
      product: dispatch
      tag: ${{ github.event.pull_request.head.sha }}
      dockerfile: services/notify/Dockerfile

  provenance-notify:
    needs: build-notify
    if: github.actor != 'dependabot[bot]' && github.event.pull_request.head.repo.fork != true
    permissions: { id-token: write, contents: read }
    uses: asanexample/trusted-ci/.github/workflows/slsa-provenance.yml@28dbe1b66c2be6b05801575617d307cafd4a67e7
    with:
      image: ${{ needs.build-notify.outputs.image }}
      digest: ${{ needs.build-notify.outputs.digest }}
      product: dispatch
