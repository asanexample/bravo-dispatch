# Dependabot — dependency + GitHub Actions + base-image update PRs.
# Free on private repos (unlike Code Scanning / GHAS). Part of platform #108 (108a).
version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "go"]
    # One batched PR/week instead of one-per-dependency (less noise; a single CI run).
    groups:
      app-dependencies:
        patterns: ["*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "ci"]
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "docker"]
    groups:
      docker:
        patterns: ["*"]
